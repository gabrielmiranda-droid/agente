services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whatsapp_saas}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-whatsapp_saas}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-WhatsApp SaaS Platform}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env.production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STRICT_CONFIG_VALIDATION: ${STRICT_CONFIG_VALIDATION:-false}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env.production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS in .env.production}
      HOST: 0.0.0.0
      PORT: 8000
      DEFAULT_HISTORY_LIMIT: ${DEFAULT_HISTORY_LIMIT:-12}
      MAX_CONTEXT_CHARACTERS: ${MAX_CONTEXT_CHARACTERS:-8000}
      MAX_RESPONSE_CHARACTERS: ${MAX_RESPONSE_CHARACTERS:-900}
      DEFAULT_EMPTY_MESSAGE_RESPONSE: ${DEFAULT_EMPTY_MESSAGE_RESPONSE}
      DEFAULT_GREETING_MESSAGE: ${DEFAULT_GREETING_MESSAGE}
      DEFAULT_AGENT_STYLE: ${DEFAULT_AGENT_STYLE}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in .env.production}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-30}
      OPENAI_MAX_COMPLETION_TOKENS: ${OPENAI_MAX_COMPLETION_TOKENS:-300}
      OPENAI_DEFAULT_TEMPERATURE: ${OPENAI_DEFAULT_TEMPERATURE:-0.3}
      WHATSAPP_TIMEOUT_SECONDS: ${WHATSAPP_TIMEOUT_SECONDS:-15}
      EXTERNAL_RETRY_ATTEMPTS: ${EXTERNAL_RETRY_ATTEMPTS:-3}
      EXTERNAL_RETRY_BACKOFF_SECONDS: ${EXTERNAL_RETRY_BACKOFF_SECONDS:-0.8}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_TASK_QUEUE_MESSAGES: ${CELERY_TASK_QUEUE_MESSAGES:-messages}
      IDEMPOTENCY_TTL_SECONDS: ${IDEMPOTENCY_TTL_SECONDS:-3600}
      BOOTSTRAP_COMPANY_NAME: ${BOOTSTRAP_COMPANY_NAME:-}
      BOOTSTRAP_COMPANY_SLUG: ${BOOTSTRAP_COMPANY_SLUG:-}
      BOOTSTRAP_DEV_NAME: ${BOOTSTRAP_DEV_NAME:-}
      BOOTSTRAP_DEV_EMAIL: ${BOOTSTRAP_DEV_EMAIL:-}
      BOOTSTRAP_DEV_PASSWORD: ${BOOTSTRAP_DEV_PASSWORD:-}
    expose:
      - "8000"
    command: sh ./scripts/start.sh
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  worker:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-WhatsApp SaaS Platform}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env.production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STRICT_CONFIG_VALIDATION: ${STRICT_CONFIG_VALIDATION:-false}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env.production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      DEFAULT_HISTORY_LIMIT: ${DEFAULT_HISTORY_LIMIT:-12}
      MAX_CONTEXT_CHARACTERS: ${MAX_CONTEXT_CHARACTERS:-8000}
      MAX_RESPONSE_CHARACTERS: ${MAX_RESPONSE_CHARACTERS:-900}
      DEFAULT_EMPTY_MESSAGE_RESPONSE: ${DEFAULT_EMPTY_MESSAGE_RESPONSE}
      DEFAULT_GREETING_MESSAGE: ${DEFAULT_GREETING_MESSAGE}
      DEFAULT_AGENT_STYLE: ${DEFAULT_AGENT_STYLE}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in .env.production}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-30}
      OPENAI_MAX_COMPLETION_TOKENS: ${OPENAI_MAX_COMPLETION_TOKENS:-300}
      OPENAI_DEFAULT_TEMPERATURE: ${OPENAI_DEFAULT_TEMPERATURE:-0.3}
      WHATSAPP_TIMEOUT_SECONDS: ${WHATSAPP_TIMEOUT_SECONDS:-15}
      EXTERNAL_RETRY_ATTEMPTS: ${EXTERNAL_RETRY_ATTEMPTS:-3}
      EXTERNAL_RETRY_BACKOFF_SECONDS: ${EXTERNAL_RETRY_BACKOFF_SECONDS:-0.8}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_TASK_QUEUE_MESSAGES: ${CELERY_TASK_QUEUE_MESSAGES:-messages}
      IDEMPOTENCY_TTL_SECONDS: ${IDEMPOTENCY_TTL_SECONDS:-3600}
      BOOTSTRAP_COMPANY_NAME: ${BOOTSTRAP_COMPANY_NAME:-}
      BOOTSTRAP_COMPANY_SLUG: ${BOOTSTRAP_COMPANY_SLUG:-}
      BOOTSTRAP_DEV_NAME: ${BOOTSTRAP_DEV_NAME:-}
      BOOTSTRAP_DEV_EMAIL: ${BOOTSTRAP_DEV_EMAIL:-}
      BOOTSTRAP_DEV_PASSWORD: ${BOOTSTRAP_DEV_PASSWORD:-}
    command: sh ./scripts/start-worker.sh

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
        FRONTEND_API_PROXY_TARGET: http://api:8000/api/v1
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN in .env.production}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?set LETSENCRYPT_EMAIL in .env.production}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/production/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
