services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: whatsapp_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: WhatsApp SaaS Platform
      APP_ENV: production
      APP_DEBUG: "false"
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/whatsapp_saas
      LOG_LEVEL: INFO
      STRICT_CONFIG_VALIDATION: "false"
      SECRET_KEY: aurionsoft_whatsapp_saas_2026_secret
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: http://painel.aurionsoft.com:3001,https://painel.aurionsoft.com,http://localhost:3000
      HOST: 0.0.0.0
      PORT: 8000
      DEFAULT_HISTORY_LIMIT: 12
      MAX_CONTEXT_CHARACTERS: 8000
      MAX_RESPONSE_CHARACTERS: 900
      DEFAULT_EMPTY_MESSAGE_RESPONSE: Ola! Nao consegui identificar sua mensagem. Pode enviar novamente com mais detalhes?
      DEFAULT_GREETING_MESSAGE: Ola! Sou o assistente virtual da {company_name}. Como posso ajudar?
      DEFAULT_AGENT_STYLE: profissional, educado e objetivo
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4.1-mini
      OPENAI_TIMEOUT_SECONDS: 30
      OPENAI_MAX_COMPLETION_TOKENS: 300
      OPENAI_DEFAULT_TEMPERATURE: 0.3
      WHATSAPP_TIMEOUT_SECONDS: 15
      EXTERNAL_RETRY_ATTEMPTS: 3
      EXTERNAL_RETRY_BACKOFF_SECONDS: 0.8
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_QUEUE_MESSAGES: messages
      IDEMPOTENCY_TTL_SECONDS: 3600
      BOOTSTRAP_COMPANY_NAME: Empresa Demo
      BOOTSTRAP_COMPANY_SLUG: empresa-demo
      BOOTSTRAP_DEV_NAME: Dev Demo
      BOOTSTRAP_DEV_EMAIL: admin@demo.com
      BOOTSTRAP_DEV_PASSWORD: De250579
    ports:
      - "8000:8000"
    command: sh ./scripts/start.sh

  worker:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: WhatsApp SaaS Platform
      APP_ENV: production
      APP_DEBUG: "false"
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/whatsapp_saas
      LOG_LEVEL: INFO
      STRICT_CONFIG_VALIDATION: "false"
      SECRET_KEY: aurionsoft_whatsapp_saas_2026_secret
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DEFAULT_HISTORY_LIMIT: 12
      MAX_CONTEXT_CHARACTERS: 8000
      MAX_RESPONSE_CHARACTERS: 900
      DEFAULT_EMPTY_MESSAGE_RESPONSE: Ola! Nao consegui identificar sua mensagem. Pode enviar novamente com mais detalhes?
      DEFAULT_GREETING_MESSAGE: Ola! Sou o assistente virtual da {company_name}. Como posso ajudar?
      DEFAULT_AGENT_STYLE: profissional, educado e objetivo
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4.1-mini
      OPENAI_TIMEOUT_SECONDS: 30
      OPENAI_MAX_COMPLETION_TOKENS: 300
      OPENAI_DEFAULT_TEMPERATURE: 0.3
      WHATSAPP_TIMEOUT_SECONDS: 15
      EXTERNAL_RETRY_ATTEMPTS: 3
      EXTERNAL_RETRY_BACKOFF_SECONDS: 0.8
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_QUEUE_MESSAGES: messages
      IDEMPOTENCY_TTL_SECONDS: 3600
      BOOTSTRAP_COMPANY_NAME: Empresa Demo
      BOOTSTRAP_COMPANY_SLUG: empresa-demo
      BOOTSTRAP_DEV_NAME: Dev Demo
      BOOTSTRAP_DEV_EMAIL: admin@demo.com
      BOOTSTRAP_DEV_PASSWORD: De250579
    command: sh ./scripts/start-worker.sh

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /backend
        FRONTEND_API_PROXY_TARGET: http://api:8000/api/v1
    restart: always
    depends_on:
      api:
        condition: service_started
    ports:
      - "3001:3000"

volumes:
  postgres_data:
  redis_data:
