services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN in .env.production}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?set LETSENCRYPT_EMAIL in .env.production}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/production/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
